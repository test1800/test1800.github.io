name: Update USD Price

on:
  workflow_dispatch:

  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

jobs:
  update-usd:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get USD price from TGJU
        run: |

          python - <<'PY'

          import urllib.request
          import re

          url = "https://www.tgju.org/%D9%82%DB%8C%D9%85%D8%AA-%D8%AF%D9%84%D8%A7%D8%B1"

          request = urllib.request.Request(
              url,
              headers={
                  "User-Agent":
                  "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120 Safari/537.36"
              }
          )

          response = urllib.request.urlopen(
              request,
              timeout=30
          )

          html = response.read().decode(
              "utf-8",
              errors="ignore"
          )


          # Search numbers close to دلار

          patterns = [

              r'دلار.{0,100}?([0-9۰-۹,]{5,})',

              r'USD.{0,100}?([0-9,]{5,})',

              r'price.{0,100}?([0-9,]{5,})'

          ]


          price = None


          for pattern in patterns:

              matches = re.findall(
                  pattern,
                  html,
                  re.IGNORECASE
              )

              if matches:

                  for value in matches:

                      clean = value

                      # Persian numbers

                      persian = "۰۱۲۳۴۵۶۷۸۹"

                      for i, digit in enumerate(persian):

                          clean = clean.replace(
                              digit,
                              str(i)
                          )


                      clean = clean.replace(
                          ",",
                          ""
                      )


                      try:

                          number = int(clean)

                          # USD price should be
                          # larger than 100,000 Rial

                          if number > 100000:

                              price = number

                              break

                      except:

                          pass


                  if price:

                      break


          if not price:

              print(
                  "Could not find USD price"
              )

              raise SystemExit(1)


          # Convert Rial to Toman

          toman = round(
              price / 10
          )


          print(
              "TGJU Rial:",
              price
          )


          print(
              "Toman:",
              toman
          )


          # Write only the number
          # to usd.txt

          with open(
              "usd.txt",
              "w",
              encoding="utf-8"
          ) as file:

              file.write(
                  str(toman)
              )

          PY


      - name: Commit USD price

        run: |

          git config user.name \
          "github-actions[bot]"

          git config user.email \
          "41898282+github-actions[bot]@users.noreply.github.com"

          git add usd.txt

          if git diff --cached --quiet; then

            echo "USD price has not changed"

          else

            git commit \
            -m "Update USD price"

            git push

          fi
