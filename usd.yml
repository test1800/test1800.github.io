name: Update USD Price

on:
  schedule:
    - cron: "*/5 * * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-usd:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Get USD price from TGJU
        run: |

          python - <<'PY'

          import urllib.request
          import re
          import json
          from datetime import datetime, timezone

          url = "https://www.tgju.org/%D9%82%DB%8C%D9%85%D8%AA-%D8%AF%D9%84%D8%A7%D8%B1"

          req = urllib.request.Request(
              url,
              headers={
                  "User-Agent": "Mozilla/5.0"
              }
          )

          html = urllib.request.urlopen(
              req,
              timeout=30
          ).read().decode(
              "utf-8",
              errors="ignore"
          )


          # Find the current free-market USD price
          # Example:
          # دلار 1,909,200 (1.72%)

          pattern = (
              r'دلار\s+'
              r'([0-9۰-۹,]+)\s*'
              r'\('
          )


          matches = re.findall(
              pattern,
              html
          )


          if not matches:

              raise Exception(
                  "USD price not found on TGJU"
              )


          price = matches[0]


          # Convert Persian digits
          persian = "۰۱۲۳۴۵۶۷۸۹"

          for i, digit in enumerate(persian):

              price = price.replace(
                  digit,
                  str(i)
              )


          # Remove commas
          price = price.replace(
              ",",
              ""
          )


          # TGJU gives Rial
          # Convert to Toman

          price_rial = int(price)

          price_toman = round(
              price_rial / 10
          )


          data = {

              "price": price_toman,

              "price_rial": price_rial,

              "updated": datetime.now(
                  timezone.utc
              ).strftime(
                  "%Y-%m-%d %H:%M UTC"
              ),

              "source":
              "TGJU"

          }


          with open(
              "usd.json",
              "w",
              encoding="utf-8"
          ) as f:

              json.dump(
                  data,
                  f,
                  ensure_ascii=False,
                  indent=2
              )


          print(
              "USD Rial:",
              price_rial
          )

          print(
              "USD Toman:",
              price_toman
          )

          PY


      - name: Commit USD data
        run: |

          git config user.name \
          "github-actions[bot]"

          git config user.email \
          "41898282+github-actions[bot]@users.noreply.github.com"

          git add usd.json

          if git diff --cached --quiet; then

            echo "No changes"

          else

            git commit \
            -m "Update USD price"

            git push

          fi