<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Financial Dashboard</title>

<style>

* {
    box-sizing: border-box;
}

:root {
    --bg: #f5f7fb;
    --card: #ffffff;
    --text: #172033;
    --muted: #7b8496;
    --border: #e8ebf1;
    --accent: #4f46e5;
    --green: #16a34a;
}

body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family:
        Arial,
        Helvetica,
        sans-serif;
}

.container {
    width: 100%;
    max-width: 1050px;
    margin: auto;
    padding: 30px 20px 50px;
}

/* HEADER */

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
}

.title h1 {
    margin: 0;
    font-size: 28px;
}

.title p {
    margin: 8px 0 0;
    color: var(--muted);
    font-size: 13px;
}

.status {
    background: white;
    border: 1px solid var(--border);
    padding: 10px 15px;
    border-radius: 12px;
    font-size: 12px;
    color: var(--green);
}

/* TOP CARDS */

.top-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
    margin-bottom: 35px;
}

.big-card {
    background: var(--card);
    border-radius: 22px;
    padding: 28px;
    border: 1px solid var(--border);
    box-shadow: 0 8px 30px rgba(20,30,60,.05);
}

.card-label {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 18px;
}

.big-value {
    font-size: 34px;
    font-weight: bold;
}

/* SECTIONS */

.section {
    margin-top: 30px;
}

.section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
}

.section-title {
    font-size: 18px;
    font-weight: bold;
}

.section-subtitle {
    font-size: 12px;
    color: var(--muted);
}

/* SMALL CARDS */

.cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
}

.card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px;
    min-height: 145px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    box-shadow: 0 8px 30px rgba(20,30,60,.04);
    transition: transform .2s ease, box-shadow .2s ease;
}

.card:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 35px rgba(20,30,60,.08);
}

.card-name {
    color: var(--muted);
    font-size: 13px;
}

.card-number {
    font-size: 27px;
    font-weight: bold;
    margin-top: 20px;
}

/* FOOTER */

.footer {
    text-align: center;
    margin-top: 40px;
    color: var(--muted);
    font-size: 11px;
}

/* MOBILE */

@media (max-width: 700px) {

    .container {
        padding: 20px 14px 40px;
    }

    .header {
        flex-direction: column;
        align-items: flex-start;
        gap: 15px;
    }

    .top-grid {
        grid-template-columns: 1fr;
    }

    .cards {
        grid-template-columns: 1fr;
    }

    .big-value {
        font-size: 30px;
    }

}

</style>
</head>


<body>

<div class="container">


<!-- HEADER -->

<header class="header">

    <div class="title">

        <h1>
            Financial Dashboard
        </h1>

        <p>
            Financial Overview & Pricing
        </p>

    </div>


    <div class="status">

        ● Online

    </div>

</header>


<!-- DATE / BALANCE -->

<div class="top-grid">


    <div class="big-card">

        <div class="card-label">
            📅 Today's Date
        </div>

        <div
            class="big-value"
            id="today">

            30/04/1405

        </div>

    </div>


    <div class="big-card">

        <div class="card-label">
            💰 Balance
        </div>

        <div
            class="big-value"
            id="balance">

            —

        </div>

    </div>


</div>



<!-- UNIT PRICE -->

<section class="section">


    <div class="section-header">

        <div class="section-title">
            Unit Price
        </div>

        <div class="section-subtitle">
            Comparison by Period
        </div>

    </div>


    <div class="cards">


        <div class="card">

            <div class="card-name">
                All Periods
            </div>

            <div
                class="card-number"
                id="unitAll">

                —

            </div>

        </div>


        <div class="card">

            <div class="card-name">
                6 Periods
            </div>

            <div
                class="card-number"
                id="unit6">

                —

            </div>

        </div>


        <div class="card">

            <div class="card-name">
                1 Period
            </div>

            <div
                class="card-number"
                id="unit1">

                —

            </div>

        </div>


    </div>

</section>



<!-- AVERAGE PRICE -->

<section class="section">


    <div class="section-header">

        <div class="section-title">
            Average Price
        </div>

        <div class="section-subtitle">
            Calculated Average by Period
        </div>

    </div>


    <div class="cards">


        <div class="card">

            <div class="card-name">
                All Periods
            </div>

            <div
                class="card-number"
                id="avgAll">

                —

            </div>

        </div>


        <div class="card">

            <div class="card-name">
                6 Periods
            </div>

            <div
                class="card-number"
                id="avg6">

                —

            </div>

        </div>


        <div class="card">

            <div class="card-name">
                1 Period
            </div>

            <div
                class="card-number"
                id="avg1">

                —

            </div>

        </div>


    </div>

</section>



<footer class="footer">

    Last Updated:
    <span id="updateTime">
        Just Now
    </span>

</footer>


</div>


<script>

/*
====================================
CURRENT DATA
====================================

Temporary values for dashboard preview.
These will later be connected
to your Excel Online data.
*/

const data = {

    today: "30/04/1405",

    balance: "—",

    unitAll: "—",

    unit6: "—",

    unit1: "—",

    avgAll: "—",

    avg6: "—",

    avg1: "—"

};


/*
====================================
DISPLAY DATA
====================================
*/

document.getElementById("today")
    .textContent =
    data.today;


document.getElementById("balance")
    .textContent =
    data.balance;


document.getElementById("unitAll")
    .textContent =
    data.unitAll;


document.getElementById("unit6")
    .textContent =
    data.unit6;


document.getElementById("unit1")
    .textContent =
    data.unit1;


document.getElementById("avgAll")
    .textContent =
    data.avgAll;


document.getElementById("avg6")
    .textContent =
    data.avg6;


document.getElementById("avg1")
    .textContent =
    data.avg1;


/*
====================================
UPDATE TIME
====================================
*/

document.getElementById("updateTime")
    .textContent =
    new Date().toLocaleString("en-US");

</script>


</body>
</html>
