<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>داشبورد مالی</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    padding: 20px;
    min-height: 100vh;
    font-family: Tahoma, Arial, sans-serif;
    background: #f4f6f8;
    color: #222;
}

.container {
    max-width: 850px;
    margin: auto;
}

.header {
    text-align: center;
    margin-bottom: 25px;
}

.header h1 {
    margin: 0;
    font-size: 28px;
}

.header p {
    color: #777;
    font-size: 13px;
}

.main-cards,
.cards {
    display: grid;
    gap: 15px;
}

.main-cards {
    grid-template-columns: 1fr 1fr;
    margin-bottom: 25px;
}

.cards {
    grid-template-columns: repeat(3, 1fr);
}

.main-card,
.card {
    background: white;
    border-radius: 18px;
    padding: 25px;
    text-align: center;
    box-shadow: 0 5px 20px rgba(0,0,0,.06);
}

.main-title,
.card-title {
    color: #777;
    font-size: 14px;
    margin-bottom: 15px;
}

.main-value {
    font-size: 30px;
    font-weight: bold;
}

.card-value {
    font-size: 24px;
    font-weight: bold;
}

.section-title {
    font-size: 19px;
    font-weight: bold;
    margin: 25px 0 12px;
}

.update {
    text-align: center;
    margin-top: 25px;
    color: #888;
    font-size: 12px;
}

@media (max-width: 600px) {

    body {
        padding: 12px;
    }

    .main-cards,
    .cards {
        grid-template-columns: 1fr;
    }

    .main-value {
        font-size: 27px;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>داشبورد مالی</h1>
        <p>آخرین اطلاعات ثبت‌شده</p>
    </div>

    <!-- تاریخ و مانده -->

    <div class="main-cards">

        <div class="main-card">
            <div class="main-title">📅 تاریخ امروز</div>
            <div class="main-value" id="today">---</div>
        </div>

        <div class="main-card">
            <div class="main-title">💰 مانده</div>
            <div class="main-value" id="balance">---</div>
        </div>

    </div>


    <!-- قیمت واحد -->

    <div class="section-title">
        قیمت واحد
    </div>

    <div class="cards">

        <div class="card">
            <div class="card-title">کل دوره</div>
            <div class="card-value" id="unitAll">---</div>
        </div>

        <div class="card">
            <div class="card-title">۶ دوره</div>
            <div class="card-value" id="unit6">---</div>
        </div>

        <div class="card">
            <div class="card-title">۱ دوره</div>
            <div class="card-value" id="unit1">---</div>
        </div>

    </div>


    <!-- قیمت میانگین -->

    <div class="section-title">
        قیمت میانگین
    </div>

    <div class="cards">

        <div class="card">
            <div class="card-title">تمام دوره</div>
            <div class="card-value" id="avgAll">---</div>
        </div>

        <div class="card">
            <div class="card-title">۶ دوره</div>
            <div class="card-value" id="avg6">---</div>
        </div>

        <div class="card">
            <div class="card-title">۱ دوره</div>
            <div class="card-value" id="avg1">---</div>
        </div>

    </div>


    <div class="update">
        آخرین بروزرسانی:
        <span id="lastUpdate">---</span>
    </div>

</div>


<script>

const DATA_URL =
"https://raw.githubusercontent.com/test1800/dashboard/main/data.json";


// تبدیل اعداد فارسی به انگلیسی

function convertPersianNumbers(value) {

    return String(value)
        .replace(/[۰-۹]/g, function(d) {
            return "۰۱۲۳۴۵۶۷۸۹".indexOf(d);
        });

}


// فرمت اعداد

function formatNumber(value) {

    if (
        value === null ||
        value === undefined ||
        value === ""
    ) {
        return "---";
    }

    let text =
        convertPersianNumbers(value)
        .replace(/,/g, "");

    let number = Number(text);

    if (!isNaN(number)) {

        return number.toLocaleString("en-US");

    }

    return value;

}


// نمایش اطلاعات

function showData(data) {

    document.getElementById("today")
        .textContent = data.today || "---";


    document.getElementById("balance")
        .textContent = formatNumber(data.balance);


    document.getElementById("unitAll")
        .textContent = formatNumber(data.unitAll);


    document.getElementById("unit6")
        .textContent = formatNumber(data.unit6);


    document.getElementById("unit1")
        .textContent = formatNumber(data.unit1);


    document.getElementById("avgAll")
        .textContent = formatNumber(data.avgAll);


    document.getElementById("avg6")
        .textContent = formatNumber(data.avg6);


    document.getElementById("avg1")
        .textContent = formatNumber(data.avg1);


    document.getElementById("lastUpdate")
        .textContent =
        new Date().toLocaleString("fa-IR");

}


// دریافت اطلاعات

async function loadData() {

    try {

        const response =
            await fetch(
                DATA_URL + "?t=" + Date.now()
            );

        if (!response.ok) {

            throw new Error(
                "خطا در دریافت داده"
            );

        }

        const data =
            await response.json();

        showData(data);

    }

    catch (error) {

        console.error(error);

        document.getElementById("lastUpdate")
            .textContent =
            "خطا در دریافت اطلاعات";

    }

}


// بارگذاری اولیه

loadData();


// بروزرسانی هر 5 دقیقه

setInterval(
    loadData,
    5 * 60 * 1000
);

</script>

</body>
</html>
