<style>

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    background: #f3f4f6;
    color: #111827;
    font-family: Arial, Helvetica, sans-serif;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 8px;
}

header {
    background: white;
    border-radius: 10px;
    padding: 12px 15px;
    margin-bottom: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

h1 {
    margin: 0;
    font-size: 21px;
}

.subtitle {
    margin-top: 3px;
    color: #6b7280;
    font-size: 11px;
}

.card {
    background: white;
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

.card h2 {
    margin: 0 0 8px 0;
    padding-bottom: 7px;
    border-bottom: 1px solid #e5e7eb;
    font-size: 16px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 6px;
}

.metric {
    padding: 9px 10px;
    border-radius: 7px;
    background: #f8fafc;
}

.metric-title {
    color: #6b7280;
    font-size: 10px;
    text-transform: uppercase;
    margin-bottom: 3px;
}

.metric-value {
    font-size: 16px;
    font-weight: bold;
}

.result {
    margin-top: 8px;
    padding: 9px;
    text-align: center;
    border-radius: 7px;
    font-size: 16px;
    font-weight: bold;
}

.investment {
    background: #dcfce7;
    color: #166534;
}

.bank {
    background: #fee2e2;
    color: #991b1b;
}

.status {
    margin-top: 6px;
    font-size: 10px;
    color: #6b7280;
}

@media(max-width:700px) {

    .container {
        padding: 5px;
    }

    .card {
        padding: 9px;
        margin-bottom: 5px;
    }

    header {
        padding: 10px 12px;
        margin-bottom: 5px;
    }

    .grid {
        gap: 4px;
    }

    .metric {
        padding: 7px 8px;
    }

    .metric-value {
        font-size: 14px;
    }

    .metric-title {
        font-size: 9px;
    }

    .card h2 {
        font-size: 14px;
        margin-bottom: 6px;
        padding-bottom: 5px;
    }

    .result {
        padding: 7px;
        margin-top: 5px;
        font-size: 14px;
    }

}

</style>
