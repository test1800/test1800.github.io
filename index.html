<script>

function $(id) {
    return document.getElementById(id);
}

function safeText(id, value) {
    const el = $(id);
    if (el) el.textContent = value;
}

function formatNumber(value) {
    if (!Number.isFinite(Number(value))) return "-";

    return Math.round(Number(value))
        .toLocaleString("en-US");
}

function formatMoneySigned(value) {
    if (!Number.isFinite(Number(value))) return "-";

    const n = Math.round(Number(value));

    if (n > 0) {
        return "+" + n.toLocaleString("en-US");
    }

    return n.toLocaleString("en-US");
}

function formatPercent(value) {
    if (!Number.isFinite(Number(value))) return "-";

    const n = Number(value);

    return (n >= 0 ? "+" : "") +
        n.toFixed(2) +
        "%";
}

function setProfitLossClass(id, value) {

    const el = $(id);

    if (!el) return;

    el.classList.remove(
        "profit",
        "loss"
    );

    el.classList.add(
        Number(value) >= 0
            ? "profit"
            : "loss"
    );
}


/* =====================================================
   JALALI
===================================================== */

function jalaliToGregorian(jy, jm, jd) {

    jy -= 979;

    let days =
        365 * jy +
        Math.floor(jy / 33) * 8 +
        Math.floor(((jy % 33) + 3) / 4);

    for (let i = 1; i < jm; i++) {
        days += i <= 6 ? 31 : 30;
    }

    days += jd - 1;

    let gy =
        1600 +
        400 * Math.floor(days / 146097);

    days %= 146097;

    if (days > 36524) {

        gy +=
            100 *
            Math.floor(--days / 36524);

        days %= 36524;

        if (days >= 365) {
            days++;
        }
    }

    gy +=
        4 *
        Math.floor(days / 1461);

    days %= 1461;

    if (days > 365) {

        gy +=
            Math.floor((days - 1) / 365);

        days =
            (days - 1) % 365;
    }

    let gd = days + 1;

    const leap =
        (
            gy % 4 === 0 &&
            gy % 100 !== 0
        ) ||
        gy % 400 === 0;

    const monthDays = [
        0,
        31,
        leap ? 29 : 28,
        31,
        30,
        31,
        30,
        31,
        31,
        30,
        31,
        30,
        31
    ];

    let gm = 1;

    while (gd > monthDays[gm]) {

        gd -= monthDays[gm];

        gm++;
    }

    return new Date(
        gy,
        gm - 1,
        gd
    );
}


function daysBetweenInclusive(start, end) {

    const s =
        start.split("/").map(Number);

    const e =
        end.split("/").map(Number);

    const startDate =
        jalaliToGregorian(
            s[0],
            s[1],
            s[2]
        );

    const endDate =
        jalaliToGregorian(
            e[0],
            e[1],
            e[2]
        );

    return Math.max(
        0,
        Math.floor(
            (
                endDate -
                startDate
            ) / 86400000
        ) + 1
    );
}


function getTodayJalali() {

    const now = new Date();

    const gy = now.getFullYear();
    const gm = now.getMonth() + 1;
    const gd = now.getDate();

    const gdm = [
        0,
        31,
        59,
        90,
        120,
        151,
        181,
        212,
        243,
        273,
        304,
        334
    ];

    let jy =
        gy > 1600
            ? 979
            : 0;

    const y =
        gy > 1600
            ? gy - 1600
            : gy - 621;

    let days =
        365 * y +
        Math.floor((y + 3) / 4) -
        Math.floor((y + 99) / 100) +
        Math.floor((y + 399) / 400) -
        80 +
        gd +
        gdm[gm - 1];

    jy +=
        33 *
        Math.floor(days / 12053);

    days %= 12053;

    jy +=
        4 *
        Math.floor(days / 1461);

    days %= 1461;

    if (days > 365) {

        jy +=
            Math.floor((days - 1) / 365);

        days =
            (days - 1) % 365;
    }

    let jm;
    let jd;

    if (days < 186) {

        jm =
            1 +
            Math.floor(days / 31);

        jd =
            1 +
            days % 31;

    } else {

        jm =
            7 +
            Math.floor(
                (days - 186) / 30
            );

        jd =
            1 +
            (days - 186) % 30;
    }

    return (
        jy +
        "/" +
        String(jm).padStart(2, "0") +
        "/" +
        String(jd).padStart(2, "0")
    );
}


function dateNumber(date) {

    const p =
        date.split("/").map(Number);

    return (
        p[0] * 10000 +
        p[1] * 100 +
        p[2]
    );
}


/* =====================================================
   BANK
===================================================== */

function compoundValue(
    principal,
    startDate,
    endDate,
    annualRate
) {

    const days =
        daysBetweenInclusive(
            startDate,
            endDate
        );

    const dailyRate =
        annualRate / 100 / 365;

    return (
        principal *
        Math.pow(
            1 + dailyRate,
            days
        )
    );
}


/* =====================================================
   FIFO PORTFOLIO
===================================================== */

function calculatePortfolio(
    transactions,
    currentPrice,
    today,
    annualRate
) {

    const lots = [];

    let realizedPurchase = 0;
    let realizedBank = 0;

    let buyCount = 0;
    let sellCount = 0;


    for (const t of transactions) {

        const amount =
            Number(t.amount);

        const price =
            Number(t.price);


        if (t.type === "buy") {

            buyCount++;

            lots.push({
                amount: amount,
                price: price,
                date: t.date
            });

        }


        else if (t.type === "sell") {

            sellCount++;

            let remaining =
                amount;


            while (
                remaining > 0 &&
                lots.length > 0
            ) {

                const lot =
                    lots[0];

                const used =
                    Math.min(
                        remaining,
                        lot.amount
                    );


                const purchaseCost =
                    used *
                    lot.price;


                const saleRevenue =
                    used *
                    price;


                const bankCost =
                    compoundValue(
                        purchaseCost,
                        lot.date,
                        t.date,
                        annualRate
                    );


                /*
                 REALIZED P/L
                 فقط سود و زیان قطعی فروش
                */

                realizedPurchase +=
                    saleRevenue -
                    purchaseCost;


                realizedBank +=
                    saleRevenue -
                    bankCost;


                lot.amount -=
                    used;

                remaining -=
                    used;


                if (
                    lot.amount <=
                    0.0000001
                ) {

                    lots.shift();

                }

            }

        }

    }


    /*
       دارایی فعلی
       فقط Lot هایی که هنوز فروخته نشده‌اند
    */

    const currentQuantity =
        lots.reduce(
            (sum, lot) =>
                sum + lot.amount,
            0
        );


    const paidAmount =
        lots.reduce(
            (sum, lot) =>
                sum +
                lot.amount *
                lot.price,
            0
        );


    const averagePurchasePrice =
        currentQuantity > 0
            ? paidAmount /
              currentQuantity
            : 0;


    /*
       ارزش بانکی دارایی‌های فعلی
       فقط Unrealized
    */

    let bankValue = 0;


    for (const lot of lots) {

        bankValue +=
            compoundValue(
                lot.amount *
                lot.price,
                lot.date,
                today,
                annualRate
            );

    }


    const currentValue =
        currentQuantity *
        currentPrice;


    const bankAdjustedPrice =
        currentQuantity > 0
            ? bankValue /
              currentQuantity
            : 0;


    /*
       Unrealized Difference
       فقط دارایی‌های موجود
    */

    const unrealizedDifference =
        currentValue -
        bankValue;


    /*
       Unrealized P/L vs Purchase
    */

    const unrealizedPLPurchase =
        paidAmount > 0
            ? (
                (
                    currentValue -
                    paidAmount
                ) /
                paidAmount
            ) * 100
            : 0;


    /*
       Unrealized P/L vs Bank
    */

    const unrealizedPLBank =
        bankValue > 0
            ? (
                (
                    currentValue -
                    bankValue
                ) /
                bankValue
            ) * 100
            : 0;


    return {

        currentQuantity,

        paidAmount,

        averagePurchasePrice,

        bankAdjustedPrice,

        currentPrice,

        currentValue,

        bankValue,

        unrealizedDifference,

        /*
           درصدهای Unrealized
        */

        unrealizedPLPurchase,

        unrealizedPLBank,

        /*
           مبالغ Realized
        */

        realizedPurchase,

        realizedBank,

        buyCount,

        sellCount

    };
}


/* =====================================================
   DISPLAY
===================================================== */

function displaySection(
    result,
    prefix
) {

    /*
       Average Purchase
    */

    safeText(
        prefix + "Average",
        formatNumber(
            result.averagePurchasePrice
        )
    );


    /*
       Paid Amount
    */

    safeText(
        prefix + "Paid",
        formatNumber(
            result.paidAmount
        )
    );


    /*
       Bank Adjusted Price
    */

    safeText(
        prefix + "Adjusted",
        formatNumber(
            result.bankAdjustedPrice
        )
    );


    /*
       Current Quantity
    */

    safeText(
        prefix + "Quantity",
        formatNumber(
            result.currentQuantity
        )
    );


    /*
       Current Value
    */

    safeText(
        prefix + "Value",
        formatNumber(
            result.currentValue
        )
    );


    /*
       Bank Value
    */

    safeText(
        prefix + "Bank",
        formatNumber(
            result.bankValue
        )
    );


    /*
       Unrealized Difference
    */

    safeText(
        prefix + "Difference",
        formatMoneySigned(
            result.unrealizedDifference
        )
    );


    /*
       IMPORTANT:
       درصدهای بالا باید Unrealized باشند
    */

    safeText(
        prefix + "PLPurchase",
        formatPercent(
            result.unrealizedPLPurchase
        )
    );


    safeText(
        prefix + "PLBank",
        formatPercent(
            result.unrealizedPLBank
        )
    );


    /*
       IMPORTANT:
       باکس‌های پایین باید Realized باشند
       یعنی فقط سود و زیان فروش‌های قطعی
    */

    safeText(
        prefix + "RealizedPurchase",
        formatMoneySigned(
            result.realizedPurchase
        )
    );


    safeText(
        prefix + "RealizedBank",
        formatMoneySigned(
            result.realizedBank
        )
    );


    /*
       رنگ Unrealized %
    */

    setProfitLossClass(
        prefix + "PLPurchase",
        result.unrealizedPLPurchase
    );


    setProfitLossClass(
        prefix + "PLBank",
        result.unrealizedPLBank
    );


    /*
       رنگ Realized P/L
    */

    setProfitLossClass(
        prefix + "RealizedPurchase",
        result.realizedPurchase
    );


    setProfitLossClass(
        prefix + "RealizedBank",
        result.realizedBank
    );


    /*
       رنگ Unrealized Difference
    */

    setProfitLossClass(
        prefix + "Difference",
        result.unrealizedDifference
    );


    /*
       وضعیت کلی بر اساس Unrealized P/L vs Bank
    */

    const mainPrice =
        $(prefix + "MainPrice");


    if (mainPrice) {

        mainPrice.classList.remove(
            "status-green",
            "status-red"
        );


        if (
            result.unrealizedPLBank >= 0
        ) {

            mainPrice.classList.add(
                "status-green"
            );

        } else {

            mainPrice.classList.add(
                "status-red"
            );

        }

    }


    /*
       نتیجه مقایسه با بانک
    */

    const resultBox =
        $(prefix + "Result");


    if (resultBox) {

        if (
            result.unrealizedPLBank >= 0
        ) {

            resultBox.textContent =
                "Investment return is better than bank";

            resultBox.style.color =
                "#34d399";

        } else {

            resultBox.textContent =
                "Bank return is better than investment";

            resultBox.style.color =
                "#f87171";

        }

    }


    /*
       تعداد معاملات
    */

    const tradeCount =
        $(prefix + "Trades");


    if (tradeCount) {

        tradeCount.textContent =
            result.buyCount +
            " IN  •  " +
            result.sellCount +
            " OUT";

    }

}


/* =====================================================
   LAST ACTION
===================================================== */

function displayLastAction(
    transactions
) {

    const badge =
        $("lastAction");


    if (
        !badge ||
        !transactions.length
    ) {

        return;

    }


    const last =
        transactions[
            transactions.length - 1
        ];


    if (
        last.type === "buy"
    ) {

        badge.textContent =
            "IN";

        badge.className =
            "action-badge action-buy";

    }

    else {

        badge.textContent =
            "OUT";

        badge.className =
            "action-badge action-sell";

    }

}


/* =====================================================
   PERIODS
===================================================== */

function buildPeriods(
    transactions
) {

    const periods = [];

    let current = null;


    for (const t of transactions) {

        if (t.type === "buy") {

            if (
                current &&
                current.transactions.length > 0
            ) {

                periods.push(
                    current
                );

            }


            current = {

                transactions: [t],

                startDate:
                    t.date,

                endDate:
                    t.date

            };

        }


        else if (
            t.type === "sell"
        ) {

            if (current) {

                current.transactions.push(
                    t
                );

                current.endDate =
                    t.date;

            }

        }

    }


    if (
        current &&
        current.transactions.length > 0
    ) {

        periods.push(
            current
        );

    }


    return periods;
}


function getLastPeriods(
    transactions,
    count
) {

    const periods =
        buildPeriods(
            transactions
        );


    return periods
        .slice(-count)
        .flatMap(
            p =>
                p.transactions
        );
}


function getLastPeriod(
    transactions
) {

    const periods =
        buildPeriods(
            transactions
        );


    if (
        periods.length === 0
    ) {

        return [];

    }


    return periods[
        periods.length - 1
    ].transactions;
}


/* =====================================================
   PRICE API
===================================================== */

async function getCurrentPrice(
    apiUrl,
    divisor
) {

    const response =
        await fetch(
            apiUrl,
            {
                method: "GET",
                headers: {
                    "Accept":
                        "application/json"
                },
                cache:
                    "no-store"
            }
        );


    if (!response.ok) {

        throw new Error(
            "Unable to get current price"
        );

    }


    const data =
        await response.json();


    if (
        !data.lastTradePrice
    ) {

        throw new Error(
            "Invalid lastTradePrice"
        );

    }


    return (
        Number(
            data.lastTradePrice
        ) /
        divisor
    );
}


/* =====================================================
   REFRESH
===================================================== */

let countdownTimer = null;
let refreshTimer = null;


function startAutoRefresh() {

    clearInterval(
        countdownTimer
    );

    clearTimeout(
        refreshTimer
    );


    let seconds = 30;


    safeText(
        "countdown",
        seconds
    );


    countdownTimer =
        setInterval(
            () => {

                seconds--;

                if (
                    seconds < 0
                ) {

                    seconds = 30;

                }


                safeText(
                    "countdown",
                    seconds
                );

            },
            1000
        );


    refreshTimer =
        setTimeout(
            () => {
                location.reload();
            },
            30000
        );

}


function manualRefresh() {

    location.reload();

}


/* =====================================================
   INIT
===================================================== */

async function init() {

    const dataResponse =
        await fetch(
            "data.json?x=" +
            Date.now()
        );


    if (!dataResponse.ok) {

        throw new Error(
            "Cannot load data.json"
        );

    }


    const data =
        await dataResponse.json();


    const annualBankRate =
        Number(
            data.annualBankRate || 40
        );


    const divisor =
        Number(
            data.priceDivisor || 10
        );


    const currentPrice =
        await getCurrentPrice(
            data.priceApi,
            divisor
        );


    const today =
        getTodayJalali();


    safeText(
        "today",
        today
    );


    safeText(
        "currentPrice",
        formatNumber(
            currentPrice
        )
    );


    safeText(
        "bankRate",
        annualBankRate + "%"
    );


    const transactions =
        Array.isArray(
            data.transactions
        )
            ? data.transactions
                .slice()
                .sort(
                    (a, b) =>
                        dateNumber(a.date) -
                        dateNumber(b.date)
                )
            : [];


    /*
       Overall
    */

    const overall =
        calculatePortfolio(
            transactions,
            currentPrice,
            today,
            annualBankRate
        );


    displaySection(
        overall,
        "overall"
    );


    /*
       Last 6 Periods
    */

    const sixTransactions =
        getLastPeriods(
            transactions,
            6
        );


    const six =
        calculatePortfolio(
            sixTransactions,
            currentPrice,
            today,
            annualBankRate
        );


    displaySection(
        six,
        "six"
    );


    /*
       Last Period
    */

    const lastTransactions =
        getLastPeriod(
            transactions
        );


    const last =
        calculatePortfolio(
            lastTransactions,
            currentPrice,
            today,
            annualBankRate
        );


    displaySection(
        last,
        "last"
    );


    displayLastAction(
        lastTransactions
    );


    safeText(
        "lastTrades",
        last.buyCount +
        " IN  •  " +
        last.sellCount +
        " OUT"
    );


    if ($("loading")) {

        $("loading").style.display =
            "none";

    }


    if ($("dashboard")) {

        $("dashboard").style.display =
            "grid";

    }

}


init()
    .then(() => {

        startAutoRefresh();

    })
    .catch(error => {

        console.error(error);


        if ($("loading")) {

            $("loading").style.display =
                "none";

        }


        if ($("errorBox")) {

            $("errorBox").innerHTML =

                `<div class="error">
                    ${error.message}
                </div>`;

        }

    });

</script>
