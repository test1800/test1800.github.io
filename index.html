<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Financial Dashboard</title>

<style>

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    background: #f5f7fb;
    color: #172033;
    font-family: Arial, Helvetica, sans-serif;
}

.container {
    max-width: 1050px;
    margin: auto;
    padding: 30px 20px 50px;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
}

h1 {
    margin: 0;
    font-size: 28px;
}

.subtitle {
    color: #7b8496;
    margin-top: 8px;
    font-size: 13px;
}

.status {
    color: #16a34a;
    background: white;
    border: 1px solid #e8ebf1;
    padding: 10px 15px;
    border-radius: 12px;
    font-size: 12px;
}

.top-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
    margin-bottom: 35px;
}

.big-card,
.card {
    background: white;
    border: 1px solid #e8ebf1;
    box-shadow: 0 8px 30px rgba(20,30,60,.05);
}

.big-card {
    padding: 28px;
    border-radius: 22px;
}

.label {
    color: #7b8496;
    font-size: 14px;
    margin-bottom: 18px;
}

.big-value {
    font-size: 34px;
    font-weight: bold;
}

.section {
    margin-top: 30px;
}

.section-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 15px;
}

.section-title {
    font-size: 18px;
    font-weight: bold;
}

.section-subtitle {
    font-size: 12px;
    color: #7b8496;
}

.cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
}

.card {
    border-radius: 20px;
    padding: 24px;
    min-height: 145px;
}

.card-name {
    color: #7b8496;
    font-size: 13px;
}

.card-number {
    font-size: 27px;
    font-weight: bold;
    margin-top: 30px;
}

.footer {
    text-align: center;
    margin-top: 40px;
    color: #7b8496;
    font-size: 11px;
}

@media(max-width:700px) {

    .container {
        padding: 20px 14px;
    }

    .header {
        flex-direction: column;
        align-items: flex-start;
        gap: 15px;
    }

    .top-grid,
    .cards {
        grid-template-columns: 1fr;
    }

}

</style>

</head>


<body>

<div class="container">


<header class="header">

<div>

<h1>
Financial Dashboard
</h1>

<div class="subtitle">
Financial Overview & Pricing
</div>

</div>

<div class="status">
● Live Data
</div>

</header>


<div class="top-grid">


<div class="big-card">

<div class="label">
📅 Today's Date
</div>

<div
class="big-value"
id="today">

Loading...

</div>

</div>


<div class="big-card">

<div class="label">
💰 Balance
</div>

<div
class="big-value"
id="balance">

Loading...

</div>

</div>


</div>


<section class="section">

<div class="section-header">

<div class="section-title">
Unit Price
</div>

<div class="section-subtitle">
Comparison by Period
</div>

</div>


<div class="cards">


<div class="card">

<div class="card-name">
All Periods
</div>

<div
class="card-number"
id="unitAll">

—

</div>

</div>


<div class="card">

<div class="card-name">
6 Periods
</div>

<div
class="card-number"
id="unit6">

—

</div>

</div>


<div class="card">

<div class="card-name">
1 Period
</div>

<div
class="card-number"
id="unit1">

—

</div>

</div>


</div>

</section>



<section class="section">

<div class="section-header">

<div class="section-title">
Average Price
</div>

<div class="section-subtitle">
Calculated Average by Period
</div>

</div>


<div class="cards">


<div class="card">

<div class="card-name">
All Periods
</div>

<div
class="card-number"
id="avgAll">

—

</div>

</div>


<div class="card">

<div class="card-name">
6 Periods
</div>

<div
class="card-number"
id="avg6">

—

</div>

</div>


<div class="card">

<div class="card-name">
1 Period
</div>

<div
class="card-number"
id="avg1">

—

</div>

</div>


</div>

</section>


<footer class="footer">

Last Updated:
<span id="updateTime">
—
</span>

</footer>


</div>


<script>


// ========================================
// LOAD DATA.JSON
// ========================================

async function loadData() {

try {


/*
این قسمت خیلی مهم است.

Date.now باعث می‌شود
هر بار URL جدید باشد
و کش قدیمی استفاده نشود.
*/

const url =
"data.json?v=" + Date.now();


const response =
await fetch(url, {

cache: "no-store"

});


if (!response.ok) {

throw new Error(
"Cannot load data.json"
);

}


const data =
await response.json();


// ========================================
// SHOW DATA
// ========================================


document.getElementById("today")
.textContent =
data.today || "—";


document.getElementById("balance")
.textContent =
formatNumber(data.balance);


document.getElementById("unitAll")
.textContent =
formatNumber(data.unitAll);


document.getElementById("unit6")
.textContent =
formatNumber(data.unit6);


document.getElementById("unit1")
.textContent =
formatNumber(data.unit1);


document.getElementById("avgAll")
.textContent =
formatNumber(data.avgAll);


document.getElementById("avg6")
.textContent =
formatNumber(data.avg6);


document.getElementById("avg1")
.textContent =
formatNumber(data.avg1);


// زمان بروزرسانی

document.getElementById("updateTime")
.textContent =
new Date()
.toLocaleString("en-US");


}

catch(error) {


console.error(error);


document.getElementById("updateTime")
.textContent =
"Update Error";


}

}


// ========================================
// FORMAT NUMBERS
// ========================================

function formatNumber(value) {


if (
value === null ||
value === undefined ||
value === ""
) {

return "—";

}


let number =
Number(
String(value)
.replace(/,/g, "")
);


if (!isNaN(number)) {

return number
.toLocaleString("en-US");

}


return value;

}


// ========================================
// FIRST LOAD
// ========================================

loadData();


// ========================================
// AUTO REFRESH
// EVERY 30 SECONDS
// ========================================

setInterval(

loadData,

30000

);


</script>

</body>

</html>
